<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Open Animator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#141312"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f4f3f0" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1040" cy="120" r="180" fill="#F2542D" fill-opacity="0.08"/>
  <circle cx="180" cy="560" r="140" fill="#F2542D" fill-opacity="0.06"/>

  <g transform="translate(120 170) scale(2.4)">
    <rect width="96" height="96" rx="20" fill="#1c1b19"/>
    <path d="M 24 72 C 24 44, 44 24, 72 24" stroke="#F2542D" stroke-width="5" stroke-linecap="round"/>
    <line x1="24" y1="72" x2="24" y2="34" stroke="#F2542D" stroke-width="2.5" opacity="0.4"/>
    <line x1="72" y1="24" x2="72" y2="62" stroke="#F2542D" stroke-width="2.5" opacity="0.4"/>
    <circle cx="24" cy="72" r="7" fill="#F2542D"/>
    <circle cx="72" cy="24" r="7" fill="#F2542D"/>
    <circle cx="24" cy="34" r="4" fill="#F2542D" opacity="0.6"/>
    <circle cx="72" cy="62" r="4" fill="#F2542D" opacity="0.6"/>
  </g>

  <text x="420" y="300" fill="#f4f3f0" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="88" font-weight="700" letter-spacing="-2">
    Open Animator
  </text>
  <text x="422" y="370" fill="#a8a49c" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="500">
    Browser-based SVG animator with keyframes
  </text>
  <rect x="422" y="410" width="220" height="8" rx="4" fill="#F2542D"/>
</svg>
