<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Open Animator</title>
    <meta
      name="description"
      content="Browser-based SVG animator for authoring simple shape animations with keyframes."
    />
    <meta name="application-name" content="Open Animator" />
    <meta name="author" content="Vitor Gomes" />
    <meta name="theme-color" content="#fdfcf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Open Animator" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#F2542D" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Open Animator" />
    <meta property="og:title" content="Open Animator" />
    <meta
      property="og:description"
      content="Browser-based SVG animator for authoring simple shape animations with keyframes."
    />
    <meta property="og:url" content="https://vgomx.github.io/open-animator/" />
    <meta property="og:image" content="https://vgomx.github.io/open-animator/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Open Animator — browser-based SVG animator" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Open Animator" />
    <meta
      name="twitter:description"
      content="Browser-based SVG animator for authoring simple shape animations with keyframes."
    />
    <meta name="twitter:image" content="https://vgomx.github.io/open-animator/og-image.png" />
    <meta name="twitter:image:alt" content="Open Animator — browser-based SVG animator" />

    <script>
      ;(function () {
        const key = 'open-animator:theme'
        const stored = localStorage.getItem(key)
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const resolved =
          stored === 'light' ? 'light' : stored === 'dark' ? 'dark' : prefersDark ? 'dark' : 'light'
        document.documentElement.classList.toggle('dark', resolved === 'dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
